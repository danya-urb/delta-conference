<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Press Wall — Delta Community Conference</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 3000px;
    height: 2000px;
    background: #09090b;
    overflow: hidden;
    position: relative;
  }

  .bg1 {
    position: absolute; top: -10%; left: 20%;
    width: 1600px; height: 1100px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.2) 0%, transparent 70%);
    border-radius: 50%; filter: blur(150px);
  }
  .bg2 {
    position: absolute; bottom: -5%; right: 5%;
    width: 1200px; height: 900px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.12) 0%, transparent 70%);
    border-radius: 50%; filter: blur(120px);
  }
  .bg3 {
    position: absolute; top: 50%; left: -5%;
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(6,182,212,0.06) 0%, transparent 70%);
    border-radius: 50%; filter: blur(80px);
  }

  .grid-lines {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 100px 100px;
  }

  .logo-grid {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 140px;
    padding: 50px 0;
  }
  .row.offset { transform: translateX(120px); }

  .logo-item { opacity: 0.7; display: flex; align-items: center; justify-content: center; }

  .l-moex img { height: 55px; }
  .l-finam img { height: 55px; }
  .l-mexc img { height: 48px; filter: brightness(0) invert(1); }
  .l-cifra img { height: 44px; }
  .l-delta img { height: 58px; }
  .l-cashers img { height: 40px; }
  .l-dt img { height: 130px; }
</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>
<div class="grid-lines"></div>

<div class="logo-grid">

<div class="row">
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
</div>

<div class="row offset">
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
</div>

<div class="row">
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.png"></div>
</div>

<div class="row offset">
  <div class="logo-item l-cifra"><img src="/logos/cifra.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
</div>

<div class="row">
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.png"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
</div>

<div class="row offset">
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.png"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
</div>

</div>
</body>
</html>
