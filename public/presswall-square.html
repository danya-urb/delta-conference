<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Press Wall Square — Delta Community Conference</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 3000px;
    height: 3000px;
    background: #09090b;
    overflow: hidden;
    position: relative;
  }

  .bg1 {
    position: absolute; top: -5%; left: 15%;
    width: 1800px; height: 1500px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.2) 0%, transparent 70%);
    border-radius: 50%; filter: blur(180px);
  }
  .bg2 {
    position: absolute; bottom: -10%; right: 5%;
    width: 1500px; height: 1200px;
    background: radial-gradient(ellipse, rgba(139,92,246,0.14) 0%, transparent 70%);
    border-radius: 50%; filter: blur(150px);
  }
  .bg3 {
    position: absolute; top: 40%; left: -10%;
    width: 1100px; height: 900px;
    background: radial-gradient(ellipse, rgba(6,182,212,0.07) 0%, transparent 70%);
    border-radius: 50%; filter: blur(100px);
  }
  .bg4 {
    position: absolute; top: 15%; right: 10%;
    width: 900px; height: 800px;
    background: radial-gradient(ellipse, rgba(99,102,241,0.1) 0%, transparent 65%);
    border-radius: 50%; filter: blur(100px);
  }

  .grid-lines {
    position: absolute; inset: 0; z-index: 1;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 120px 120px;
  }

  .logo-grid {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 180px;
    padding: 70px 0;
  }
  .row.offset { transform: translateX(140px); }

  .logo-item { opacity: 0.7; display: flex; align-items: center; justify-content: center; }

  .l-moex img { height: 80px; }
  .l-finam img { height: 80px; }
  .l-mexc img { height: 70px; filter: brightness(0) invert(1); }
  .l-cifra img { height: 65px; filter: brightness(0) invert(1); }
  .l-delta img { height: 85px; }
  .l-cashers img { height: 60px; }
  .l-dt img { height: 180px; }
</style>
</head>
<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>
<div class="bg4"></div>
<div class="grid-lines"></div>

<div class="logo-grid">

<div class="row">
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
</div>

<div class="row offset">
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
</div>

<div class="row">
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
</div>

<div class="row offset">
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
</div>

<div class="row">
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
</div>

<div class="row offset">
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
</div>

<div class="row">
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
  <div class="logo-item l-mexc"><img src="/logos/mexc.svg"></div>
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
</div>

<div class="row offset">
  <div class="logo-item l-delta"><img src="/logos/delta.png"></div>
  <div class="logo-item l-cashers"><img src="/logos/cashers.png"></div>
  <div class="logo-item l-dt"><img src="/logos/delta-team.png"></div>
  <div class="logo-item l-moex"><img src="/logos/moex.svg"></div>
  <div class="logo-item l-finam"><img src="/logos/finam.png"></div>
  <div class="logo-item l-cifra"><img src="/logos/cifra.svg"></div>
</div>

</div>
</body>
</html>
